name: Seed Sermon Friday

on:
  schedule:
    # Friday 2:00 PM America/Chicago
    # GitHub Actions cron is UTC
    - cron: "0 20 * * 5"
  workflow_dispatch:

jobs:
  seed-sermon:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-api-python-client google-auth

      - name: Run seed sermon script
        env:
          WEBFLOW_TOKEN: ${{ secrets.WEBFLOW_TOKEN }}
          GOOGLE_SERVICE_JSON: ${{ secrets.GOOGLE_SERVICE_JSON }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: python upload_sermon_seed.py
